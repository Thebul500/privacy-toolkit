services:
  privacy-toolkit:
    build: .
    container_name: privacy-toolkit
    ports:
      - "8384:8080"
    environment:
      # Simple password auth — set to enable (no OAuth2 proxy needed):
      # - PRIVACY_TOOLKIT_PASSWORD=changeme
      - PRIVACY_TOOLKIT_PASSWORD=${PRIVACY_TOOLKIT_PASSWORD:-}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./brokers:/app/brokers
      - ./templates:/app/templates
      - ./guides:/app/guides
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    container_name: oauth2-proxy
    environment:
      - OAUTH2_PROXY_PROVIDER=github
      - OAUTH2_PROXY_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_COOKIE_SECRET}
      - OAUTH2_PROXY_COOKIE_SECURE=true
      - OAUTH2_PROXY_COOKIE_SAMESITE=lax
      - OAUTH2_PROXY_COOKIE_HTTPONLY=true
      - OAUTH2_PROXY_COOKIE_EXPIRE=168h
      - OAUTH2_PROXY_UPSTREAMS=http://privacy-toolkit:8080
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_REDIRECT_URL=https://privacy.example.com/oauth2/callback
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_GITHUB_USERS=${GITHUB_ALLOWED_USERS}
      - OAUTH2_PROXY_SKIP_AUTH_ROUTES=^/api/health$
      - OAUTH2_PROXY_SET_XAUTHREQUEST=true
      - OAUTH2_PROXY_PASS_ACCESS_TOKEN=false
      - OAUTH2_PROXY_SESSION_STORE_TYPE=cookie
    ports:
      - "4180:4180"
    depends_on:
      - privacy-toolkit
    restart: unless-stopped

networks:
  default:

<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Privacy Toolkit{% endblock %}</title>
    <!-- nosemgrep: missing-integrity — Tailwind CDN generates dynamic CSS, SRI hashes not applicable -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
    <script>
        function getCsrfToken() {
            var m = document.cookie.match(/(?:^|;\s*)_csrf_token=([^;]*)/);
            return m ? decodeURIComponent(m[1]) : '';
        }
        document.addEventListener('DOMContentLoaded', function() {
            document.body.addEventListener('htmx:configRequest', function(e) {
                e.detail.headers['X-CSRF-Token'] = getCsrfToken();
            });
        });
    </script>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 50: '#f8fafc', 100: '#e2e8f0', 200: '#94a3b8', 300: '#64748b', 400: '#475569', 500: '#334155', 600: '#1e293b', 700: '#0f172a', 800: '#0d1117', 900: '#010409' }
                    }
                }
            }
        }
    </script>
</head>
<body class="dark h-full bg-dark-800 text-dark-100">
    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Mobile top bar -->
    <div class="md:hidden flex items-center justify-between px-4 py-3 bg-dark-900 border-b border-dark-600">
        <span class="text-sm font-bold text-white tracking-tight">Privacy Toolkit</span>
        <button onclick="openSidebar()" class="p-1 text-dark-200 hover:text-white" aria-label="Open menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
    </div>

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden" onclick="closeSidebar()"></div>

    <div class="flex h-full">
        <!-- Sidebar -->
        <nav id="sidebar" class="fixed z-40 h-full -translate-x-full md:static md:translate-x-0 transition-transform duration-200 w-56 bg-dark-900 border-r border-dark-600 flex flex-col shrink-0">
            <div class="px-4 py-5 border-b border-dark-600 flex items-center justify-between">
                <div>
                    <h1 class="text-lg font-bold text-white tracking-tight">Privacy Toolkit</h1>
                    <p class="text-xs text-dark-300 mt-0.5">Data Broker Defense</p>
                </div>
                <button onclick="closeSidebar()" class="md:hidden p-1 text-dark-300 hover:text-white" aria-label="Close menu">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="flex-1 py-3 space-y-0.5 px-2">
                <a href="/" onclick="closeSidebar()" class="nav-link {% if active == 'dashboard' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                    Dashboard
                </a>
                <a href="/profiles" onclick="closeSidebar()" class="nav-link {% if active == 'profiles' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    Profiles
                </a>
                <a href="/scans" onclick="closeSidebar()" class="nav-link {% if active == 'scans' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    Scans
                </a>
                <a href="/accounts" onclick="closeSidebar()" class="nav-link {% if active == 'accounts' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
                    Accounts
                </a>
                <a href="/removals" onclick="closeSidebar()" class="nav-link {% if active == 'removals' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    Removals
                </a>
                <a href="/brokers" onclick="closeSidebar()" class="nav-link {% if active == 'brokers' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    Brokers
                </a>
                <a href="/activity" onclick="closeSidebar()" class="nav-link {% if active == 'activity' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    Activity
                </a>
            </div>
            <div class="px-4 py-3 border-t border-dark-600 text-xs text-dark-300">
                v1.0 &middot; Web Dashboard
            </div>
        </nav>

        <!-- Main content -->
        <main class="flex-1 overflow-auto">
            <div class="page-content max-w-6xl mx-auto px-4 sm:px-6 py-6">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        /* Mobile sidebar */
        function openSidebar() {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.remove('hidden');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');
        }

        /* Toast notifications */
        function showToast(message, type) {
            type = type || 'info';
            var colors = {
                success: 'bg-green-900/90 border-green-700 text-green-200',
                error: 'bg-red-900/90 border-red-700 text-red-200',
                info: 'bg-blue-900/90 border-blue-700 text-blue-200'
            };
            var icons = {
                success: '<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
                error: '<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>',
                info: '<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
            };
            var el = document.createElement('div');
            el.className = 'toast flex items-center gap-2 px-4 py-3 rounded-lg border text-sm shadow-lg ' + (colors[type] || colors.info);
            el.innerHTML = (icons[type] || icons.info) + '<span>' + message + '</span>';
            document.getElementById('toast-container').appendChild(el);
            setTimeout(function() {
                el.classList.add('toast-exit');
                setTimeout(function() { el.remove(); }, 300);
            }, 4000);
        }

        /* Read toast from URL params on page load */
        document.addEventListener('DOMContentLoaded', function() {
            var params = new URLSearchParams(window.location.search);
            var msg = params.get('message');
            if (msg) {
                var msgType = params.get('message_type') || 'info';
                showToast(decodeURIComponent(msg.replace(/\+/g, ' ')), msgType);
                params.delete('message');
                params.delete('message_type');
                var clean = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
                history.replaceState(null, '', clean);
            }
        });

        /* HTMX error → toast */
        document.body.addEventListener('htmx:responseError', function(e) {
            showToast('Request failed: ' + (e.detail.xhr.status || 'network error'), 'error');
        });

        /* Form submit handler — prevent double-submit, add spinner */
        document.addEventListener('submit', function(e) {
            var form = e.target;
            if (form.hasAttribute('hx-post') || form.hasAttribute('hx-get')) return;
            var btn = form.querySelector('button[type="submit"]');
            if (btn && !btn.disabled) {
                btn.disabled = true;
                var spinner = '<svg class="w-4 h-4 animate-spin inline-block mr-1" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>';
                btn.innerHTML = spinner + btn.textContent.trim() + '...';
            }
        });
    </script>
</body>
</html>

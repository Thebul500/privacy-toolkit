slug: facecheck
name: FaceCheck.ID
url: https://facecheck.id
category: face_search
priority: high
data_types:
  - photos
  - facial_data
opt_out:
  methods:
    - type: manual
      instructions: "Submit removal request at https://facecheck.id/Face-Search/RemoveMyPhotos. Requires uploading a blurred photo ID for verification."
      url: https://facecheck.id/Face-Search/RemoveMyPhotos
    - type: form
      url: https://facecheck.id/Face-Search/RemoveMyPhotos
      steps:
        - action: goto
          url: https://facecheck.id/Face-Search/RemoveMyPhotos
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: screenshot
          name: facecheck_submission
  verification:
    type: check_listing
    check_url: https://facecheck.id
    expected_days: 14
  reappearance:
    frequency_days: 90
notes: "Facial recognition search engine. Requires ID upload for verification. High privacy risk."

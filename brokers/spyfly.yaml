slug: spyfly
name: SpyFly
url: https://www.spyfly.com
category: background_check
priority: medium
data_types:
  - name
  - address
  - phone
  - criminal_records
opt_out:
  methods:
    - type: form
      url: https://www.spyfly.com/help-center/remove-my-public-record
      steps:
        - action: goto
          url: https://www.spyfly.com/help-center/remove-my-public-record
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: spyfly_submission
    - type: email
      address: support@spyfly.com
      template: ccpa_deletion_request
      subject: ""
  verification:
    type: check_listing
    check_url: https://www.spyfly.com
    expected_days: 14
  reappearance:
    frequency_days: 90
notes: "Background check service with criminal records data."

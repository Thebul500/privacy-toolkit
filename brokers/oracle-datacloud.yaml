slug: oracle-datacloud
name: Oracle Data Cloud
url: https://www.oracle.com/cx/advertising/
privacy_policy_url: https://www.oracle.com/legal/privacy/
category: data_aggregator
priority: high
data_types:
  - name
  - email
  - address
  - browsing_history
  - purchase_history
opt_out:
  methods:
    - type: email
      address: privacy-inquiries_us@oracle.com
      template: ccpa_deletion_request
      subject: ""
    - type: form
      url: https://www.oracle.com/legal/privacy/advertising-privacy-policy.html
      steps:
        - action: goto
          url: https://www.oracle.com/legal/privacy/advertising-privacy-policy.html
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: oracle_datacloud_submission
  verification:
    type: check_listing
    check_url: https://www.oracle.com/cx/advertising/
    expected_days: 30
  reappearance:
    frequency_days: 180
notes: "Major marketing data broker. Opt-out section located in advertising privacy policy."

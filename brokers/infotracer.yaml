slug: infotracer
name: InfoTracer
url: https://www.infotracer.com
category: people_search
priority: high
data_types:
  - name
  - phone
  - email
  - address
opt_out:
  methods:
    - type: form
      url: https://infotracer.com/optout
      steps:
        - action: goto
          url: https://infotracer.com/optout
        - action: fill
          selector: "input[name='first_name'], #firstName"
          field: first_name
        - action: fill
          selector: "input[name='last_name'], #lastName"
          field: last_name
        - action: click
          selector: "button[type='submit'], .submit-btn"
        - action: screenshot
          name: "infotracer_submission"
  verification:
    type: check_listing
    expected_days: 14
  reappearance:
    frequency_days: 90
notes: ""

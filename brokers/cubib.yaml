slug: cubib
name: Cubib
url: https://cubib.com
category: people_search
priority: medium
data_types:
  - name
  - phone
  - address
opt_out:
  methods:
    - type: form
      url: https://cubib.com/opt-out
      steps:
        - action: goto
          url: https://cubib.com/opt-out
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: cubib_submission
  verification:
    type: check_listing
    check_url: https://cubib.com
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "People search directory with standard opt-out process."

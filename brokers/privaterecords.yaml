slug: privaterecords
name: PrivateRecords
url: https://www.privaterecords.net
category: people_search
priority: medium
data_types:
  - name
  - phone
  - address
opt_out:
  methods:
    - type: form
      url: https://www.privaterecords.net/optOut/name/landing
      steps:
        - action: goto
          url: https://www.privaterecords.net/optOut/name/landing
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: privaterecords_submission
  verification:
    type: check_listing
    check_url: https://www.privaterecords.net
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "People search engine with public records data."

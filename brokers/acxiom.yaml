slug: acxiom
name: Acxiom
url: https://www.acxiom.com
category: data_aggregator
priority: high
data_types:
  - name
  - phone
  - email
  - address
opt_out:
  methods:
    - type: form
      url: https://isapps.acxiom.com/optout/optout.aspx
      steps:
        - action: goto
          url: https://isapps.acxiom.com/optout/optout.aspx
        - action: fill
          selector: "input[name='first_name'], #firstName, .first-name"
          field: first_name
        - action: fill
          selector: "input[name='last_name'], #lastName, .last-name"
          field: last_name
        - action: click
          selector: "button[type='submit'], .submit-btn, #submit"
        - action: screenshot
          name: "acxiom_submission"
  verification:
    type: check_listing
    expected_days: 14
  reappearance:
    frequency_days: 90
notes: "Major data aggregator behind many other brokers"

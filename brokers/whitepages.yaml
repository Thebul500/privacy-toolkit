slug: whitepages
name: Whitepages
url: https://www.whitepages.com
privacy_policy_url: https://www.whitepages.com/privacy-policy
category: people_search
priority: critical
data_types:
  - name
  - phone
  - email
  - address
opt_out:
  methods:
    - type: form
      url: https://www.whitepages.com/suppression-requests
      steps:
        - action: goto
          url: https://www.whitepages.com/suppression-requests
        - action: fill
          selector: "input[name=name]"
          field: name
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: whitepages_submission
    - type: email
      address: suppression@whitepages.com
      template: ccpa_deletion_request
      subject: ""
  verification:
    type: check_listing
    check_url: https://www.whitepages.com/search
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Phone verification required"

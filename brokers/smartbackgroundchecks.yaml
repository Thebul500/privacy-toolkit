slug: smartbackgroundchecks
name: SmartBackgroundChecks
url: https://www.smartbackgroundchecks.com
category: people_search
priority: critical
data_types:
  - name
  - phone
  - email
  - address
opt_out:
  methods:
    - type: form
      url: https://www.smartbackgroundchecks.com/optout
      steps:
        - action: goto
          url: https://www.smartbackgroundchecks.com/optout
        - action: fill
          selector: "input[name='first_name']"
          field: "first_name"
        - action: fill
          selector: "input[name='last_name']"
          field: "last_name"
        - action: fill
          selector: "input[name='state']"
          field: "state"
        - action: click
          selector: "button[name='search']"
        - action: screenshot
          name: "smartbackgroundchecks_submission"
  verification:
    type: check_listing
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Also covers PeopleFinders listings"

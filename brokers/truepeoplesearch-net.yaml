slug: truepeoplesearch-net
name: TruePeopleSearch.net
url: https://truepeoplesearch.net
category: people_search
priority: high
data_types:
  - name
  - phone
  - address
opt_out:
  methods:
    - type: form
      url: https://docs.google.com/forms/d/e/1FAIpQLSeCPggzv4iXE20iUjcr6vdVWxBOblCyGwDLcO-jZA5j2YF5fQ/viewform
      steps:
        - action: goto
          url: https://docs.google.com/forms/d/e/1FAIpQLSeCPggzv4iXE20iUjcr6vdVWxBOblCyGwDLcO-jZA5j2YF5fQ/viewform
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: truepeoplesearch_net_submission
  verification:
    type: check_listing
    check_url: https://truepeoplesearch.net
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Different from truepeoplesearch.com. Uses Google Forms for opt-out requests."

slug: propertyrecs
name: PropertyRecs
url: https://propertyrecs.com
category: public_records
priority: medium
data_types:
  - name
  - address
  - property_records
opt_out:
  methods:
    - type: form
      url: https://dashboard.propertyrecs.com/opt-out
      steps:
        - action: goto
          url: https://dashboard.propertyrecs.com/opt-out
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: propertyrecs_submission
  verification:
    type: check_listing
    check_url: https://propertyrecs.com
    expected_days: 14
  reappearance:
    frequency_days: 90
notes: "Property records aggregator. Dashboard-based opt-out system."

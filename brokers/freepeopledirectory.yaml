slug: freepeopledirectory
name: FreePeopleDirectory
url: https://www.freepeopledirectory.com
category: people_search
priority: low
data_types:
  - name
  - phone
  - address
opt_out:
  methods:
    - type: form
      url: https://www.spokeo.com/optout
      steps:
        - action: goto
          url: https://www.spokeo.com/optout
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: freepeopledirectory_submission
  verification:
    type: check_listing
    check_url: https://www.freepeopledirectory.com
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Uses Spokeo's opt-out system. Remove from Spokeo to remove from this site."

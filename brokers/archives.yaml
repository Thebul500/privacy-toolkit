slug: archives
name: Archives.com
url: https://www.archives.com
category: public_records
priority: medium
data_types:
  - name
  - address
  - public_records
opt_out:
  methods:
    - type: form
      url: https://www.archives.com/Optout
      steps:
        - action: goto
          url: https://www.archives.com/Optout
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: archives_submission
  verification:
    type: check_listing
    check_url: https://www.archives.com
    expected_days: 14
  reappearance:
    frequency_days: 90
notes: "Public records aggregator focused on historical records."

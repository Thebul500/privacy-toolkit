slug: pimeyes
name: PimEyes
url: https://pimeyes.com
category: face_search
priority: high
data_types:
  - photos
  - facial_data
opt_out:
  methods:
    - type: manual
      instructions: "Submit opt-out request at https://pimeyes.com/en/opt-out-request-form. Requires uploading your photo and a blurred photo ID for verification."
      url: https://pimeyes.com/en/opt-out-request-form
    - type: form
      url: https://pimeyes.com/en/opt-out-request-form
      steps:
        - action: goto
          url: https://pimeyes.com/en/opt-out-request-form
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: screenshot
          name: pimeyes_submission
  verification:
    type: check_listing
    check_url: https://pimeyes.com
    expected_days: 14
  reappearance:
    frequency_days: 90
notes: "Major facial recognition search engine. Requires photo and ID upload. High privacy risk."

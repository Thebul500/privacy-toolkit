slug: peoplebyname
name: PeopleByName
url: https://www.peoplebyname.com
category: people_search
priority: medium
data_types:
  - name
  - phone
  - email
  - address
opt_out:
  methods:
    - type: form
      url: https://www.peoplebyname.com/remove
      steps:
        - action: goto
          url: https://www.peoplebyname.com/remove
        - action: fill
          selector: "input[name='first_name'], #firstName"
          field: first_name
        - action: fill
          selector: "input[name='last_name'], #lastName"
          field: last_name
        - action: click
          selector: "button[type='submit'], .submit-btn"
        - action: screenshot
          name: "peoplebyname_submission"
  verification:
    type: check_listing
    expected_days: 14
  reappearance:
    frequency_days: 180
notes: ""

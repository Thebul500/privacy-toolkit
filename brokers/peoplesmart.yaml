slug: peoplesmart
name: PeopleSmart
url: https://www.peoplesmart.com
category: people_search
priority: medium
data_types:
  - name
  - phone
  - address
  - email
opt_out:
  methods:
    - type: email
      address: support@peoplesmart.com
      template: ccpa_deletion_request
      subject: ""
    - type: form
      url: https://www.peoplesmart.com/optout
      steps:
        - action: goto
          url: https://www.peoplesmart.com/optout
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: peoplesmart_submission
  verification:
    type: check_listing
    check_url: https://www.peoplesmart.com
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Owned by BeenVerified. Email-based removal preferred."

slug: veripages
name: Veripages
url: https://veripages.com
category: people_search
priority: medium
data_types:
  - name
  - phone
  - address
opt_out:
  methods:
    - type: form
      url: https://veripages.com/inner/control-privacy
      steps:
        - action: goto
          url: https://veripages.com/inner/control-privacy
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: veripages_submission
  verification:
    type: check_listing
    check_url: https://veripages.com
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Requires CAPTCHA completion and email verification for opt-out."

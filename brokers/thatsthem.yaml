slug: thatsthem
name: ThatsThem
url: https://thatsthem.com
category: people_search
priority: critical
data_types:
  - name
  - phone
  - email
  - address
opt_out:
  methods:
    - type: form
      url: https://thatsthem.com/optout
      steps:
        - action: goto
          url: https://thatsthem.com/optout
        - action: fill
          selector: "input[name='first_name']"
          field: "first_name"
        - action: fill
          selector: "input[name='last_name']"
          field: "last_name"
        - action: fill
          selector: "input[name='city']"
          field: "city"
        - action: fill
          selector: "input[name='state']"
          field: "state"
        - action: click
          selector: "button[type='submit']"
        - action: screenshot
          name: "thatsthem_submission"
  verification:
    type: check_listing
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: ""

slug: radaris
name: Radaris
url: https://radaris.com
privacy_policy_url: https://radaris.com/page/privacy
category: people_search
priority: critical
data_types:
  - name
  - phone
  - email
  - address
opt_out:
  methods:
    - type: form
      url: https://radaris.com/control/privacy
      steps:
        - action: goto
          url: https://radaris.com/control/privacy
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: radaris_submission
    - type: email
      address: customer-service@radaris.com
      template: ccpa_deletion_request
      subject: ""
  verification:
    type: check_listing
    check_url: https://radaris.com/search
    expected_days: 14
  reappearance:
    frequency_days: 90
notes: "May require account creation to remove listing"

slug: peoplelooker
name: PeopleLooker
url: https://www.peoplelooker.com
category: people_search
priority: high
data_types:
  - name
  - phone
  - address
  - email
opt_out:
  methods:
    - type: form
      url: https://www.peoplelooker.com/f/optout/search
      steps:
        - action: goto
          url: https://www.peoplelooker.com/f/optout/search
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: peoplelooker_submission
  verification:
    type: check_listing
    check_url: https://www.peoplelooker.com
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Owned by BeenVerified. Uses BeenVerified-style opt-out process."

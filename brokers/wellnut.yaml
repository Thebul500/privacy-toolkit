slug: wellnut
name: Wellnut
url: https://wellnut.com
category: people_search
priority: low
data_types:
  - name
  - phone
  - address
opt_out:
  methods:
    - type: form
      url: https://wellnut.com/optout
      steps:
        - action: goto
          url: https://wellnut.com/optout
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: wellnut_submission
  verification:
    type: check_listing
    check_url: https://wellnut.com
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Low-traffic people search directory with standard opt-out."

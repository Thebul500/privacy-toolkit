slug: gladiknow
name: GladIKnow
url: https://gladiknow.com
category: people_search
priority: medium
data_types:
  - name
  - phone
  - address
opt_out:
  methods:
    - type: form
      url: https://gladiknow.com/opt-out
      steps:
        - action: goto
          url: https://gladiknow.com/opt-out
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: gladiknow_submission
  verification:
    type: check_listing
    check_url: https://gladiknow.com
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Standard people search directory with opt-out form."

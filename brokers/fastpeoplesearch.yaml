slug: fastpeoplesearch
name: FastPeopleSearch
url: https://www.fastpeoplesearch.com
category: people_search
priority: high
data_types:
  - name
  - phone
  - email
  - address
opt_out:
  methods:
    - type: form
      url: https://www.fastpeoplesearch.com/removal
      steps:
        - action: goto
          url: https://www.fastpeoplesearch.com/removal
        - action: fill
          selector: "input[name='first_name'], #firstName, .first-name"
          field: first_name
        - action: fill
          selector: "input[name='last_name'], #lastName, .last-name"
          field: last_name
        - action: click
          selector: "button[type='submit'], .submit-btn, #submit"
        - action: screenshot
          name: "fastpeoplesearch_submission"
  verification:
    type: check_listing
    expected_days: 3
  reappearance:
    frequency_days: 90
notes: ""

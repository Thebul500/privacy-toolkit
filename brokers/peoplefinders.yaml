slug: peoplefinders
name: PeopleFinders
url: https://www.peoplefinders.com
category: people_search
priority: critical
data_types:
  - name
  - phone
  - address
  - email
opt_out:
  methods:
    - type: form
      url: https://www.peoplefinders.com/manage
      steps:
        - action: goto
          url: https://www.peoplefinders.com/manage
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: peoplefinders_submission
  verification:
    type: check_listing
    check_url: https://www.peoplefinders.com
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "High-traffic people search site. Critical priority due to extensive data exposure."

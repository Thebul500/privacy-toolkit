slug: neighbor-who
name: Neighbor Who
url: https://www.neighborwho.com
category: people_search
priority: medium
data_types:
  - name
  - address
  - property_records
opt_out:
  methods:
    - type: form
      url: https://www.neighborwho.com/optout
      steps:
        - action: goto
          url: https://www.neighborwho.com/optout
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: neighbor_who_submission
  verification:
    type: check_listing
    check_url: https://www.neighborwho.com
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Address-based people search with property data focus."

slug: beenverified
name: BeenVerified
url: https://www.beenverified.com
privacy_policy_url: https://www.beenverified.com/privacy
category: people_search
priority: critical
data_types:
  - name
  - phone
  - email
  - address
opt_out:
  methods:
    - type: form
      url: https://www.beenverified.com/f/optout/search
      steps:
        - action: goto
          url: https://www.beenverified.com/f/optout/search
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "select[name=state]"
          field: state
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: beenverified_submission
    - type: email
      address: support@beenverified.com
      template: ccpa_deletion_request
      subject: ""
  verification:
    type: check_listing
    check_url: https://www.beenverified.com/f/results
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Only allows one opt-out per email address"

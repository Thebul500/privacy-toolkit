slug: transunion
name: TransUnion
url: https://www.transunion.com
category: credit_bureau
priority: high
data_types:
  - name
  - address
  - phone
  - email
  - credit_data
opt_out:
  methods:
    - type: form
      url: https://www.transunion.com/consumer-privacy
      steps:
        - action: goto
          url: https://www.transunion.com/consumer-privacy
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: transunion_submission
  verification:
    type: check_listing
    check_url: https://www.transunion.com
    expected_days: 30
  reappearance:
    frequency_days: 180
notes: "Major credit bureau. Opt-out applies to marketing and pre-approved credit offers."

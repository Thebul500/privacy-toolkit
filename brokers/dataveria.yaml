slug: dataveria
name: Dataveria
url: https://dataveria.com
category: people_search
priority: medium
data_types:
  - name
  - phone
  - address
  - email
opt_out:
  methods:
    - type: form
      url: https://dataveria.com/ng/control/privacy
      steps:
        - action: goto
          url: https://dataveria.com/ng/control/privacy
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: dataveria_submission
  verification:
    type: check_listing
    check_url: https://dataveria.com
    expected_days: 7
  reappearance:
    frequency_days: 90
notes: "Uses privacy control portal for opt-out requests."

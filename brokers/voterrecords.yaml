slug: voterrecords
name: VoterRecords
url: https://voterrecords.com
category: public_records
priority: high
data_types:
  - name
  - address
  - voter_registration
opt_out:
  methods:
    - type: form
      url: https://voterrecords.com
      steps:
        - action: goto
          url: https://voterrecords.com
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: voterrecords_submission
  verification:
    type: check_listing
    check_url: https://voterrecords.com
    expected_days: 14
  reappearance:
    frequency_days: 90
notes: "Voter registration database. Opt-out form located at bottom of listing pages."

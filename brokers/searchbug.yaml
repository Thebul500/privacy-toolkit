slug: searchbug
name: Searchbug
url: https://www.searchbug.com
category: people_search
priority: low
data_types:
  - name
  - phone
  - address
opt_out:
  methods:
    - type: form
      url: https://www.searchbug.com/contact-us.aspx
      steps:
        - action: goto
          url: https://www.searchbug.com/contact-us.aspx
        - action: fill
          selector: "input[name=first_name]"
          field: first_name
        - action: fill
          selector: "input[name=last_name]"
          field: last_name
        - action: fill
          selector: "input[name=email]"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: searchbug_submission
    - type: phone
      number: "(760) 454-7301"
      instructions: "Call to request removal during business hours."
  verification:
    type: check_listing
    check_url: https://www.searchbug.com
    expected_days: 14
  reappearance:
    frequency_days: 90
notes: "Contact form-based removal. Phone option available during business hours."

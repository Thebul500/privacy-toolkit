slug: spokeo
name: Spokeo
url: https://www.spokeo.com
privacy_policy_url: https://www.spokeo.com/privacy
category: people_search
priority: critical
data_types:
  - name
  - phone
  - email
  - address
opt_out:
  methods:
    - type: form
      url: https://www.spokeo.com/optout
      steps:
        - action: goto
          url: https://www.spokeo.com/optout
        - action: fill
          selector: "#url-input"
          field: spokeo_listing_url
        - action: fill
          selector: "#email-input"
          field: email
        - action: click
          selector: "button[type=submit]"
        - action: screenshot
          name: spokeo_submission
    - type: email
      address: customercare@spokeo.com
      template: ccpa_deletion_request
      subject: ""
  verification:
    type: check_listing
    check_url: https://www.spokeo.com/search
    expected_days: 3
  reappearance:
    frequency_days: 90
notes: ""

name: Weekly Security Scan

on:
  schedule:
    - cron: '0 8 * * 0'  # Sunday 2 AM CST (8 UTC)
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/security-audit
          generateSarif: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  bandit:
    name: Bandit Security Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r src/ --format json --output bandit-results.json -ll || true
          bandit -r src/ --format txt -ll || true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results
          path: bandit-results.json

  create-issue:
    name: Create Issue for Findings
    runs-on: ubuntu-latest
    needs: [semgrep, bandit]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit for issue creation
        run: |
          bandit -r src/ --format json --output bandit-results.json -ll || true

      - name: Create issue if critical/high findings
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let banditFindings = [];
            try {
              const banditData = JSON.parse(fs.readFileSync('bandit-results.json', 'utf8'));
              banditFindings = (banditData.results || []).filter(
                r => r.issue_severity === 'HIGH' || r.issue_severity === 'MEDIUM'
              );
            } catch (e) {
              console.log('No Bandit results found');
            }

            if (banditFindings.length === 0) {
              console.log('No high/medium findings — no issue needed');
              return;
            }

            const date = new Date().toISOString().split('T')[0];
            const title = `Security Scan Findings — ${date}`;

            // Check if issue already exists for today
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
            });

            const alreadyExists = existingIssues.data.some(i => i.title === title);
            if (alreadyExists) {
              console.log('Issue already exists for today');
              return;
            }

            let body = `## Weekly Security Scan Results\n\n`;
            body += `**Date**: ${date}\n`;
            body += `**Bandit findings**: ${banditFindings.length}\n\n`;

            if (banditFindings.length > 0) {
              body += `### Bandit Findings\n\n`;
              body += `| Severity | File | Line | Issue |\n`;
              body += `|----------|------|------|-------|\n`;
              for (const f of banditFindings.slice(0, 20)) {
                body += `| ${f.issue_severity} | \`${f.filename}\` | ${f.line_number} | ${f.issue_text} |\n`;
              }
            }

            body += `\n---\nGenerated by weekly security scan workflow`;

            // Ensure label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'security',
                color: 'e11d48',
                description: 'Security-related findings',
              });
            } catch (e) {
              // Label may already exist
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security'],
            });

            console.log(`Created issue: ${title}`);
